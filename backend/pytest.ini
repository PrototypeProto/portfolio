[pytest]
asyncio_mode = auto
asyncio_default_fixture_loop_scope = session
asyncio_default_test_loop_scope = session
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Suppress noisy SQLAlchemy echo during tests
log_cli = false
filterwarnings =
    ignore::DeprecationWarning
    ignore::sqlalchemy.exc.SAWarning

markers =
    triggers: Tests that assert on Postgres trigger-maintained counters (requires --run-triggers)