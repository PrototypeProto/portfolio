[tool.ruff]
line-length = 100
target-version = "py314"   # match your actual Python version
exclude = [
    "migrations",
    ".venv",
    "__pycache__",
    "shared_media",
    "logs",
    "tempfs_storage",
]

[tool.ruff.lint]
select = [
    "E",    # pycodestyle errors
    "F",    # pyflakes (unused imports, undefined names — would have caught the Config NameError if it were a top-level use)
    "W",    # pycodestyle warnings
    "S",    # flake8-bandit — security rules
    "B",    # flake8-bugbear — likely bugs
    "UP",   # pyupgrade — modernize syntax
    "SIM",  # flake8-simplify
    "T20",  # flake8-print — flags stray print() calls
]
ignore = [
    "E501",   # line too long — let the formatter handle this
    "S101",   # use of assert — fine in tests
    "B008",   # function call in default arg — FastAPI's Depends() pattern triggers this constantly
]

[tool.ruff.lint.per-file-ignores]
"tests/**/*.py" = ["S101", "S105", "S106"]   # assert, hardcoded passwords — fine in tests
"migrations/**/*.py" = ["ALL"]                # don't lint autogenerated alembic files

[tool.ruff.format]
quote-style = "double"
indent-style = "space"