services: 

  pgsql-db:
    container_name: portfolio-db
    image: postgres:18.1
    shm_size: 1024mb
    restart: always
    ports:
      - "127.0.0.1:5432:5432" # bind to Host Machine
    volumes:
      - pgsql_portfolio:/var/lib/postgresql
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    healthcheck: 
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - backend-net

  redis-db:
    container_name: redis-db
    image: redis:latest
    restart: always
    # --save "" --appendonly no : To not write to disk, DEV ONLY
    command: ["redis-server", "--requirepass", "${REDIS_PASSWORD}", "--save", "", "--appendonly", "no"]
    ports:
      - "127.0.0.1:6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - backend-net

  server-py:
    container_name: server-py
    build:
      context: ./backend
      dockerfile: Dockerfile
      args:
        UID: 1000
        GID: 1000
    ports:
      - "127.0.0.1:8000:8000"
    volumes:
      - ./backend:/backend
    env_file:
      - ./backend/.env
    depends_on:
      pgsql-db:
        condition: service_healthy
      redis-db:
        condition: service_healthy
    networks:
      - backend-net

  frontend:
    container_name: portfolio-fe
    build:
      context: ./frontend
      dockerfile: Dockerfile
    volumes:
      - ./frontend:/frontend
    ports:
      - "127.0.0.1:5173:5173"
    depends_on:
      - server-py
    networks:
      - backend-net
    
volumes:
  pgsql_portfolio:

networks:
  backend-net:
    driver: bridge