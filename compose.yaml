services:

  # Dev: PostgreSQL
  pgsql-db:
    container_name: portfolio-db
    image: postgres:18.1
    shm_size: 1024mb
    restart: always
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - pgsql_portfolio:/var/lib/postgresql
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - backend-net

  # Dev: Redis
  redis-db:
    container_name: redis-db
    image: redis:latest
    restart: always
    # --save "" --appendonly no: no disk persistence in dev
    command: ["redis-server", "--requirepass", "${REDIS_PASSWORD}", "--save", "", "--appendonly", "no"]
    ports:
      - "127.0.0.1:6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - backend-net

  # Test: PostgreSQL
  # Isolated test DB on port 5433. No named volume — data is ephemeral.
  # Not started by default: use the profile flag: `docker compose --profile test up
  pgsql-test:
    container_name: portfolio-db-test
    image: postgres:18.1
    restart: "no"
    profiles: ["test"]
    ports:
      - "127.0.0.1:5433:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: portfolio_test
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d portfolio_test"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - backend-net

  # Test: Redis
  # No password, no persistence. Separate from dev Redis on 6379.
  redis-test:
    container_name: redis-test
    image: redis:latest
    restart: "no"
    profiles: ["test"]
    command: ["redis-server", "--save", "", "--appendonly", "no"]
    ports:
      - "127.0.0.1:6380:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - backend-net

  # Dev Backend
  server-py:
    container_name: server-py
    build:
      context: ./backend
      dockerfile: Dockerfile
      args:
        UID: 1000
        GID: 1000
    ports:
      - "127.0.0.1:8000:8000"
    volumes:
      - ./backend:/backend
    env_file:
      - ./backend/.env
    depends_on:
      pgsql-db:
        condition: service_healthy
      redis-db:
        condition: service_healthy
    networks:
      - backend-net

  # Dev Frontend
  frontend:
    container_name: portfolio-fe
    build:
      context: ./frontend
      dockerfile: Dockerfile
    volumes:
      - ./frontend:/frontend
    ports:
      - "127.0.0.1:5173:5173"
    depends_on:
      - server-py
    networks:
      - backend-net

volumes:
  pgsql_portfolio:

networks:
  backend-net:
    driver: bridge
